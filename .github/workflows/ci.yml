name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: wealthpilot
          POSTGRES_PASSWORD: wealthpilot_dev
          POSTGRES_DB: wealthpilot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --ignore E402

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://wealthpilot:wealthpilot_dev@localhost:5432/wealthpilot_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only
          GEMINI_API_KEY: dummy
          NEWS_API_KEY: dummy
          APP_ENV: test
        run: pytest tests/ -v --tb=short
